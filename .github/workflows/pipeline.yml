name: DE Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 pipeline/ --max-line-length=120

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pandas
      - name: Run DQ checks
        run: |
          python -c "
          import pandas as pd
          import sys
          sys.path.insert(0, 'pipeline')
          from dq_checks import run_all_checks
          df = pd.read_csv('data/transformed_data.csv')
          run_all_checks(df)
          "
